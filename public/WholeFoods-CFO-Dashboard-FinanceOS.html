<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Whole Foods Market — Executive Finance Terminal | FinanceOS Enterprise</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06080c;--surface:rgba(16,19,26,0.85);--surfaceAlt:rgba(22,26,35,0.9);--surfaceDeep:#0d1017;
  --border:rgba(255,255,255,0.06);--borderSub:rgba(255,255,255,0.04);--borderAccent:rgba(0,100,47,0.15);
  --text:#f0f2f5;--textSec:#b0b9ca;--textMuted:#636d84;--textFaint:#3d4558;
  --wf:#00643f;--wfLight:#00a86b;--wfGlow:rgba(0,168,107,0.15);--wfBg:rgba(0,100,63,0.06);--wfBorder:rgba(0,168,107,0.12);
  --green:#3dd9a0;--greenBg:rgba(61,217,160,0.08);--red:#f87171;--redBg:rgba(248,113,113,0.08);
  --amber:#f5b731;--amberBg:rgba(245,183,49,0.08);--blue:#60a5fa;--blueBg:rgba(96,165,250,0.08);
  --purple:#a78bfa;--purpleBg:rgba(167,139,250,0.08);--cyan:#22d3ee;--cyanBg:rgba(34,211,238,0.08);
  --mono:'JetBrains Mono',monospace;--sans:'Manrope',system-ui,sans-serif;
  --r:14px;--r-sm:8px;--r-lg:18px;--r-xl:24px;
  --shadow:0 2px 12px rgba(0,0,0,0.3),0 0 0 1px var(--border);
  --shadow-md:0 8px 32px rgba(0,0,0,0.4),0 0 0 1px rgba(0,168,107,0.08);
  --shadow-lg:0 16px 48px rgba(0,0,0,0.5),0 0 0 1px rgba(0,168,107,0.1);
  --shadow-glow:0 0 40px rgba(0,168,107,0.06);
  --spring:cubic-bezier(0.22,1,0.36,1);--bounce:cubic-bezier(0.34,1.56,0.64,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh}
::selection{background:var(--wf);color:#fff}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes shimmer{0%{background-position:-400% 0}100%{background-position:400% 0}}
@keyframes pulse{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(0,168,107,0.08)}50%{box-shadow:0 0 40px rgba(0,168,107,0.15)}}
@keyframes gradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes borderPulse{0%,100%{border-color:rgba(0,168,107,0.08)}50%{border-color:rgba(0,168,107,0.2)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes barFill{from{width:0}to{width:var(--fill)}}

.fade{animation:fadeUp .5s var(--spring) both}
.fade-d1{animation-delay:.05s}.fade-d2{animation-delay:.1s}.fade-d3{animation-delay:.15s}
.fade-d4{animation-delay:.2s}.fade-d5{animation-delay:.25s}.fade-d6{animation-delay:.3s}

/* ═══ GLASSMORPHISM CARDS ═══ */
.card{
  background:linear-gradient(165deg,rgba(16,19,26,0.92),rgba(12,14,20,0.96));
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-radius:var(--r-lg);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  position:relative;overflow:hidden;
  transition:all .4s var(--spring);
}
.card::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.04),transparent);
  pointer-events:none;
}
.card:hover{
  box-shadow:var(--shadow-md);
  border-color:rgba(255,255,255,0.1);
  transform:translateY(-2px);
}
.card-accent{position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0}
.card-glow{position:absolute;top:-50%;left:-50%;width:200%;height:200%;pointer-events:none;opacity:0;transition:opacity .6s}
.card:hover .card-glow{opacity:1}

/* ═══ TAGS & BUTTONS ═══ */
.tag{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font-size:9px;font-weight:700;letter-spacing:.05em;backdrop-filter:blur(8px)}
.btn{font-family:var(--sans);cursor:pointer;border:none;border-radius:var(--r-sm);font-weight:700;transition:all .2s var(--spring);display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:7px 14px;white-space:nowrap;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s;background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent)}
.btn:hover::after{opacity:1}
.btn-wf{background:linear-gradient(135deg,#00643f,#00a86b);color:#fff;box-shadow:0 4px 16px rgba(0,168,107,0.2),inset 0 1px 0 rgba(255,255,255,0.12)}
.btn-wf:hover{box-shadow:0 8px 32px rgba(0,168,107,0.3),inset 0 1px 0 rgba(255,255,255,0.15);transform:translateY(-1px)}
.btn-outline{background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--textSec)}
.btn-outline:hover{border-color:var(--wfBorder);color:var(--wfLight);background:var(--wfBg)}
.btn-ghost{background:transparent;border:none;color:var(--textMuted);padding:5px 8px}
.btn-ghost:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.btn-sm{font-size:10px;padding:5px 10px}
.avatar{border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.08);box-shadow:0 2px 8px rgba(0,0,0,0.3)}

/* ═══ SIDEBAR ═══ */
.sidebar-btn{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--r-sm);font-size:11px;font-weight:600;color:var(--textSec);cursor:pointer;transition:all .2s var(--spring);border:none;background:none;width:100%;text-align:left;font-family:var(--sans)}
.sidebar-btn:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.sidebar-btn.active{background:var(--wfBg);color:var(--wfLight);font-weight:700;border:1px solid var(--wfBorder);box-shadow:0 0 20px rgba(0,168,107,0.05)}

/* ═══ UTILITIES ═══ */
.metric-bar{height:6px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden}
.metric-fill{height:100%;border-radius:3px;transition:width .8s var(--spring)}
.admin-tab{padding:0 16px;height:40px;display:flex;align-items:center;font-size:11px;font-weight:600;color:var(--textMuted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s var(--spring);background:none;border-top:none;border-left:none;border-right:none;font-family:var(--sans);gap:6px}
.admin-tab:hover{color:var(--text)}
.admin-tab.active{color:var(--wfLight);border-bottom-color:var(--wfLight);font-weight:700}
.kpi-value{font-size:24px;font-weight:800;font-family:var(--mono);letter-spacing:-.03em;line-height:1}
.section-title{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:var(--textFaint);margin-bottom:10px}
.msg-row{display:flex;gap:10px;padding:12px 0;align-items:flex-start}
.msg-row+.msg-row{border-top:1px solid var(--borderSub)}
.task-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-sm);transition:all .2s var(--spring)}
.task-row:hover{background:rgba(255,255,255,0.03)}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.12)}

/* Gradient text */
.gradient-text{background:linear-gradient(135deg,var(--wfLight),var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
</style>
</head>
<body>

<!-- ═══ EXECUTIVE BRAND BAR ═══ -->
<div style="background:linear-gradient(135deg,#001a10 0%,#002a1a 40%,#001510 100%);height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid rgba(0,168,107,0.08);position:relative;overflow:hidden">
  <!-- Animated gradient line -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,168,107,0.3),rgba(61,217,160,0.2),transparent);background-size:400% 100%;animation:gradient 8s ease infinite"></div>

</div>

<!-- ═══ ADMIN TABS ═══ -->
<div style="background:linear-gradient(180deg,rgba(16,19,26,0.95),rgba(12,14,20,0.98));backdrop-filter:blur(24px);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;padding:0 24px;position:sticky;top:0;z-index:100">

<script>
// ═══ DATA ═══
const admins = [
  {id:"cfo",name:"Daniel Park",role:"CFO",photo:"https://images.unsplash.com/photo-1560250097-0b93528c311a?w=80&q=80&fit=crop&crop=face",status:"online"},
  {id:"vpf",name:"Rachel Torres",role:"VP Finance",photo:"https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=80&q=80&fit=crop&crop=face",status:"online"},
  {id:"ctrl",name:"Andre Williams",role:"Controller",photo:"https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=80&q=80&fit=crop&crop=face",status:"away"},
  {id:"fpa",name:"Maya Singh",role:"FP&A Director",photo:"https://images.unsplash.com/photo-1580489944761-15a19d654956?w=80&q=80&fit=crop&crop=face",status:"online"},
  {id:"trs",name:"Kevin Cho",role:"Treasury",photo:"https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?w=80&q=80&fit=crop&crop=face",status:"offline"},
  {id:"ops",name:"Lisa Nakamura",role:"VP Operations",photo:"https://images.unsplash.com/photo-1594744803329-e58b31de8bf5?w=80&q=80&fit=crop&crop=face",status:"online"},
];

const tasks=[
  {t:"Review Q1 earnings draft",a:"Rachel Torres",p:"high",due:"Mar 26",s:"In Progress",c:"Reporting"},
  {t:"Finalize store-level P&L rollup",a:"Andre Williams",p:"high",due:"Mar 27",s:"In Review",c:"Close"},
  {t:"Private label margin analysis",a:"Maya Singh",p:"medium",due:"Mar 28",s:"In Progress",c:"Modeling"},
  {t:"Board deck — same-store sales bridge",a:"Daniel Park",p:"high",due:"Mar 25",s:"Draft",c:"Board"},
  {t:"Supplier cost renegotiation model",a:"Rachel Torres",p:"medium",due:"Mar 30",s:"Not Started",c:"Procurement"},
  {t:"Cash position & sweep optimization",a:"Kevin Cho",p:"medium",due:"Mar 28",s:"In Progress",c:"Treasury"},
  {t:"New store opening pro formas (Q2)",a:"Maya Singh",p:"low",due:"Apr 5",s:"Not Started",c:"Expansion"},
  {t:"Organic category trend deck",a:"Lisa Nakamura",p:"high",due:"Mar 25",s:"Draft",c:"Ops"},
];

const msgs=[
  {from:admins[1],text:"Private label EBITDA margin hit 38.2% — 420bps above national brand. Recommending 15% more shelf allocation for 365 Everyday Value line.",time:"2:45 PM",channel:"#finance-leadership"},
  {from:admins[0],text:"Strong. Also pull the shrinkage data by region. The Midwest pilot with AI-powered inventory reduced waste 22% — want that in the board deck.",time:"2:48 PM",channel:"#finance-leadership"},
  {from:admins[3],text:"Same-store sales +4.8% comp. Organic produce drove 62% of the basket growth. The premium positioning is resonating post-price investments.",time:"2:52 PM",channel:"#finance-leadership"},
  {from:admins[2],text:"Store-level P&L close is at 94% — 6 locations outstanding (all Pacific NW). Expecting full close by tomorrow noon. Margins look healthy.",time:"3:01 PM",channel:"#finance-leadership"},
  {from:admins[5],text:"Supply chain efficiency up 8.3% QoQ. The new regional distribution hub cut delivery times 31% for 127 stores. Ready for the ops section of the board deck.",time:"3:14 PM",channel:"#finance-leadership"},

const kpis=[
  {l:"Net Revenue",v:"$21.2B",d:"+6.8%",u:1,bar:"var(--wfLight)",n:"TTM Consolidated"},
  {l:"Gross Margin",v:"36.4%",d:"+180bps",u:1,bar:"var(--green)",n:"vs 34.6% prior year"},
  {l:"Store EBITDA",v:"$2.86B",d:"+11.2%",u:1,bar:"var(--blue)",n:"13.5% EBITDA margin"},

const segs=[
  {n:"Northeast",r:5520,p:26,g:5.4,m:37.8,stores:141,c:"var(--wfLight)"},
  {n:"Southeast",r:3920,p:18.5,g:7.2,m:35.1,stores:98,c:"var(--green)"},
  {n:"Midwest",r:3180,p:15,g:8.8,m:34.2,stores:79,c:"var(--blue)"},
  {n:"Southwest",r:3680,p:17.4,g:6.1,m:36.9,stores:92,c:"var(--amber)"},
  {n:"Pacific",r:4900,p:23.1,g:4.2,m:38.4,stores:121,c:"var(--purple)"},

let activeAdmin = "cfo";
let activeView = "overview";
let panelOpen = null;

// ═══ RENDER ADMIN TABS ═══
function renderAdminTabs(){
  document.getElementById('adminTabs').innerHTML = admins.map(a=>`
    <button class="admin-tab ${a.id===activeAdmin?'active':''}" onclick="switchAdmin('${a.id}')">
      <img src="${a.photo}" style="width:18px;height:18px;border-radius:50%;object-fit:cover;border:1.5px solid ${a.id===activeAdmin?'var(--wfLight)':'transparent'};transition:border .2s">
      <span>${a.role}</span>
    </button>
  `).join('');
}

function switchAdmin(id){activeAdmin=id;renderAdminTabs();renderContent();}

// ═══ RENDER SIDEBAR ═══
function renderSidebar(){
  const fin=[{i:"◆",l:"Overview",v:"overview"},{i:"▣",l:"P&L Statement",v:"pnl"},{i:"◈",l:"Regions",v:"segments"},{i:"▲",l:"Forecast",v:"forecast"},{i:"◎",l:"Cash Flow",v:"cashflow"},{i:"◉",l:"Board Deck",v:"board"}];
  const org=[{i:"■",l:"Tasks",v:"tasks",b:tasks.filter(t=>t.s!=="Complete").length},{i:"▹",l:"Messages",v:"messages",b:msgs.length},{i:"◇",l:"Team",v:"team"},{i:"▫",l:"Calendar",v:"calendar"},{i:"◻",l:"Documents",v:"docs"},{i:"▧",l:"Pipeline",v:"pipeline"}];
  document.getElementById('sidebarFinance').innerHTML=fin.map(f=>`<button class="sidebar-btn ${f.v===activeView?'active':''}" onclick="switchView('${f.v}')"><span style="width:16px;text-align:center;font-size:12px;opacity:.5">${f.i}</span>${f.l}</button>`).join('');
  document.getElementById('sidebarOrg').innerHTML=org.map(o=>`<button class="sidebar-btn ${o.v===activeView?'active':''}" onclick="switchView('${o.v}')"><span style="width:16px;text-align:center;font-size:12px;opacity:.5">${o.i}</span>${o.l}${o.b?`<span class="tag" style="background:linear-gradient(135deg,var(--wf),var(--wfLight));color:#fff;margin-left:auto;padding:2px 6px;font-size:8px">${o.b}</span>`:''}</button>`).join('');

function switchView(v){activeView=v;renderSidebar();renderContent();}

function renderContent(){
  const el=document.getElementById('content');
  const admin=admins.find(a=>a.id===activeAdmin);
  if(activeView==='overview')el.innerHTML=renderOverview(admin);
  else if(activeView==='tasks')el.innerHTML=renderTasks(admin);

  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">${segs.map((s,i)=>`<div class="card fade fade-d${i+1}" style="padding:20px;border-left:3px solid ${s.c}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span style="font-size:14px;font-weight:700">${s.n}</span><span class="tag" style="background:var(--greenBg);color:var(--green);border:1px solid rgba(61,217,160,0.08)">+${s.g}%</span></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">${[{l:"Revenue",v:`$${(s.r/1000).toFixed(1)}B`},{l:"Margin",v:`${s.m}%`},{l:"Stores",v:s.stores}].map(m=>`<div><div style="font-size:7px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--textFaint);margin-bottom:3px">${m.l}</div><div style="font-size:17px;font-weight:800;font-family:var(--mono)">${m.v}</div></div>`).join('')}</div><div class="metric-bar" style="height:4px"><div class="metric-fill" style="width:${s.p*2.6}%;background:${s.c};opacity:.4"></div></div><div style="font-size:8px;color:var(--textFaint);margin-top:6px">${s.p}% of total revenue</div></div>`).join('')}
  <div class="card fade fade-d6" style="padding:20px;grid-column:span 2"><div class="card-accent" style="background:linear-gradient(90deg,var(--wfLight),var(--green))"></div><div style="font-size:13px;font-weight:800;margin-bottom:12px">Revenue Mix</div><div style="display:flex;height:32px;border-radius:8px;overflow:hidden;margin-bottom:8px">${segs.map(s=>`<div style="width:${s.p}%;background:${s.c};opacity:.5;transition:opacity .2s" onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='.5'"></div>`).join('')}</div><div style="display:flex;gap:16px;flex-wrap:wrap">${segs.map(s=>`<div style="display:flex;align-items:center;gap:4px;font-size:9px;color:var(--textSec)"><div style="width:8px;height:8px;border-radius:2px;background:${s.c};opacity:.5"></div>${s.n} ${s.p}%</div>`).join('')}</div></div>
  </div>`;
}

    {name:"Demo Scheduled",items:[{title:"Whole Foods — Enterprise",value:"$180K/yr",status:"Demo Mar 26"},{title:"Kroger — Regional Analytics",value:"$96K/yr",status:"Demo Mar 28"}],color:"var(--purple)"},

  ];
  return `<div style="margin-bottom:20px" class="fade"><div class="section-title">Organization</div><h2 style="font-size:20px;font-weight:800;letter-spacing:-.02em">Deal Pipeline</h2><p style="font-size:10px;color:var(--textMuted);margin-top:4px">Enterprise client acquisition funnel</p></div>

// ═══ PANELS ═══
function togglePanel(type){
  const p=document.getElementById('rightPanel');
  if(panelOpen===type){p.style.display='none';panelOpen=null;return;}
  panelOpen=type;p.style.display='block';
  if(type==='copilot')p.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:13px;font-weight:800">AI Copilot</span><span class="tag" style="background:var(--purpleBg);color:var(--purple);border:1px solid rgba(167,139,250,0.1)"><span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--purple);animation:pulse 2s infinite;margin-right:2px"></span>CLAUDE</span></div><button class="btn btn-ghost" onclick="togglePanel('copilot')" style="font-size:14px">&times;</button></div>
  <p style="font-size:10px;color:var(--textMuted);margin-bottom:14px;line-height:1.5">Ask about Whole Foods financials, regional performance, category mix, or scenario models.</p>
  ${['What drove same-store comp growth?','Private label vs national brand margins','Model 5% basket size increase','New store ROI by region'].map(q=>`<button class="btn btn-outline btn-sm" style="width:100%;text-align:left;margin-bottom:4px;font-size:10px;transition:all .2s var(--spring)" onmouseover="this.style.borderColor='var(--wfBorder)';this.style.transform='translateX(3px)'" onmouseout="this.style.borderColor='var(--border)';this.style.transform='none'">▸ ${q}</button>`).join('')}
  <div style="background:rgba(255,255,255,0.02);border-radius:var(--r);padding:16px;margin:16px 0;border:1px solid var(--borderSub)">
    <div style="font-size:9px;font-weight:700;color:var(--blue);margin-bottom:6px">You</div>
    <div style="font-size:11px;margin-bottom:12px">What drove same-store comp growth this quarter?</div>
    <div style="font-size:9px;font-weight:700;color:var(--purple);margin-bottom:6px;display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--purple);animation:pulse 2s infinite"></span>Copilot</div>
    <div style="font-size:10px;color:var(--textSec);line-height:1.65">Same-store comps <strong>+4.8%</strong> driven by three factors:<br><br><strong>1.</strong> Organic produce: 62% of basket growth, +8.2% category<br><strong>2.</strong> Private label (365): 38.2% margin, expanded 15% shelf share<br><strong>3.</strong> Price investments: traffic +3.1%, conversion +1.4pp<br><br>Midwest strongest at +8.8%, reflecting AI inventory pilot impact on freshness scores and reduced shrinkage.<br><br><em style="font-size:8px;color:var(--textFaint)">Confidence: High &middot; Sources: Store-Level P&L, Category Analytics, Inventory System</em></div>
  </div>
  <div style="display:flex;gap:5px;position:sticky;bottom:0;background:var(--surfaceDeep);padding:8px 0"><input placeholder="Ask about financials..." style="flex:1;padding:8px 12px;border-radius:var(--r-sm);border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--text);font-size:10px;font-family:var(--sans);outline:none;transition:border .2s" onfocus="this.style.borderColor='var(--wfBorder)'" onblur="this.style.borderColor='var(--border)'"><button class="btn btn-wf btn-sm">▸</button></div>`;
}
