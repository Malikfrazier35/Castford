<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cash Position · Castford CFO</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif&family=Geist+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script>window.__CFO_PAGE = 'cash';</script>
  <script src="https://unpkg.com/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="/site/auth-guard.js" defer></script>
  <script src="/site/cfo-subpage-shell.js" defer></script>
  <script src="/site/cfo-cash-brain.js" defer></script>
</head>
<body>
  <main class="cfo-page">
    <h1 class="cfo-title">Cash Position</h1>
    <p class="cfo-subtitle">Real-time cash tracking with weekly inflow/outflow, working capital, and runway projection.</p>

    <div class="cfo-kpi-row" id="cash-kpis">
      <div class="cfo-kpi-card"><div class="k-label">Cash Position</div><div class="k-value" data-kpi="cash_position">—</div></div>
      <div class="cfo-kpi-card"><div class="k-label">Accounts Receivable</div><div class="k-value" data-kpi="ar">—</div></div>
      <div class="cfo-kpi-card"><div class="k-label">Accounts Payable</div><div class="k-value" data-kpi="ap">—</div></div>
      <div class="cfo-kpi-card"><div class="k-label">Working Capital</div><div class="k-value" data-kpi="working_capital">—</div></div>
      <div class="cfo-kpi-card"><div class="k-label">Monthly Burn</div><div class="k-value" data-kpi="monthly_burn">—</div></div>
      <div class="cfo-kpi-card"><div class="k-label">Runway</div><div class="k-value" data-kpi="runway">—</div></div>
    </div>

    <div class="grid-2">
      <section class="cfo-panel">
        <div class="cfo-panel-title">Weekly Cash Flow · Last 13 Weeks</div>
        <div id="cash-weekly">
          <div class="cfo-loading">Loading…</div>
        </div>
      </section>
      <section class="cfo-panel">
        <div class="cfo-panel-title">Monthly Net Cash · Last 12 Months</div>
        <div id="cash-monthly">
          <div class="cfo-loading">Loading…</div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
