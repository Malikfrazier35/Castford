<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Castford Dashboard</title>
  <link rel="icon" type="image/png" href="/site/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    // Update page title from URL role param before render
    (function() {
      var role = (new URLSearchParams(window.location.search)).get('role') || 'ceo';
      var titles = { ceo: 'Founder', cfo: 'CFO Hub', controller: 'Controller', fpa: 'FP&A', treasurer: 'Treasurer' };
      document.title = 'Castford — ' + (titles[role] || 'Dashboard');
    })();
  </script>
</head>
<body>
  <main id="eng-page">
    <div style="text-align:center;padding:80px 20px;color:#64748b;font-family:'Instrument Sans',-apple-system,sans-serif;font-size:13px">
      <div style="opacity:0.6">Loading dashboard…</div>
    </div>
  </main>

  <!-- Supabase UMD for auth-guard + engine token retrieval -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/site/auth-guard.js"></script>
  <script src="/site/dashboard-engine.js?v=1"></script>
</body>
</html>
